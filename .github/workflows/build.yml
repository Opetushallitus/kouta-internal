name: Kouta-internal megabuild and manual deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Environment
        options:
          - hahtuva
          - untuva
          - pallero
          - sade
      image-tag:
        type: string
        description: image tag to use for deployment
  push:
    paths-ignore:
      - '**.md'

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout read
  security-events: write # Required for trivy results

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - uses: szenius/set-timezone@ce9c440bc3af4f51b28d7ef7e5c47ee8f26c8dcb # v1.2
        with:
          timezoneLinux: "Europe/Helsinki"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@67fbcbb121271f7775d2e7715933280b06314838 # v1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: kouta-internal-build
          aws-region: eu-west-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Build with Maven
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd postgresql/docker
          docker build --tag koutainternal-postgres .
          cd -
          mvn clean package -B --settings settings.xml

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: restore-build
        with:
          path: target
          key: ${{ github.sha }}

  push-container:
    needs: test-and-build
    uses: Opetushallitus/.github/.github/workflows/push-scan-java-ecr.yml@2f06269d5ac067ef17a76d2d5742db0b325e9a2e # main
    with:
      application: 'kouta-internal'
      base-image: 'baseimage-fatjar-openjdk21:master'
      configfolder: 'src/main/resources/*'
      jarfile: 'kouta-internal-*-with-dependencies'
      type: jar
    secrets:
      AWS_UTILITY_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  deploy-to-environment:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.environment != 'none' }}
    needs: [test-and-build, push-container]
    uses: Opetushallitus/.github/.github/workflows/deploy-from-ecr-to-ecs.yml@2f06269d5ac067ef17a76d2d5742db0b325e9a2e # main
    with:
      application: 'kouta-internal'
      environment: ${{ inputs.environment }}
      image-tag: ${{ inputs.image-tag }}
